<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0F1117">
<title>Page Not Found — NextRoutine</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/style.css">
<style>
.four-oh-four{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;background:var(--bg-base)}
.four-oh-four-inner{max-width:480px}
.four-oh-four-code{font-family:var(--font-heading);font-size:120px;font-weight:800;color:var(--green);line-height:1;margin-bottom:8px;letter-spacing:-.05em;opacity:.3}
.four-oh-four h1{font-size:32px;margin-bottom:16px}
.four-oh-four p{font-size:18px;color:var(--text-secondary);line-height:1.7;margin-bottom:32px}
.four-oh-four .btn{margin:0 8px 12px}
@media(max-width:768px){.four-oh-four-code{font-size:80px}.four-oh-four h1{font-size:24px}.four-oh-four p{font-size:16px}}
</style>
</head>
<body>
<div class="four-oh-four">
  <div class="four-oh-four-inner">
    <div class="four-oh-four-code" aria-hidden="true">404</div>
    <h1>This page wandered off during the night feed.</h1>
    <p>We have looked everywhere — behind the crib, under the changing mat, inside the nappy bag. It is not here. But the rest of the site is exactly where you left it.</p>
    <a href="/" class="btn btn-primary">Back to Home →</a>
    <a href="/blog/" class="btn btn-outline">Read the Blog</a>
  </div>
</div>
</body>
</html>
