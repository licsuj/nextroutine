/* QUIZ-CRITICAL STYLES (inline so they always apply) */
.quiz-progress { margin-bottom: 2.5rem; }
.quiz-progress-bar {
  width: 100%;
  height: 4px;
  background-color: hsl(150, 8%, 14%);
  border-radius: 9999px;
  overflow: hidden;
}
.quiz-progress-fill {
  height: 100%;
  background-color: hsl(155, 45%, 32%);
  border-radius: 9999px;
  transition: width 400ms cubic-bezier(0.4, 0, 0.2, 1);
}
.quiz-progress-label {
  margin-top: 0.625rem;
  font-size: 0.8125rem;
  color: hsl(150, 8%, 50%);
  font-weight: 500;
  letter-spacing: 0.02em;
}
.quiz-step { display: none !important; }
.quiz-step.active {
  display: block !important;
  animation: quizFadeIn 350ms cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes quizFadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.quiz-question {
  font-family: 'Fraunces', Georgia, serif;
  font-size: clamp(1.5rem, 3.5vw, 2.25rem);
  font-weight: 500;
  line-height: 1.2;
  letter-spacing: -0.015em;
  color: hsl(150, 5%, 96%);
  margin: 0 0 0.5rem;
  text-wrap: balance;
}
.quiz-question-sub {
  font-size: 0.9375rem;
  color: hsl(150, 8%, 65%);
  margin: 0 0 2rem;
}
.quiz-options {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.quiz-option {
  background-color: hsl(150, 8%, 9%);
  border: 1px solid hsl(150, 8%, 18%);
  color: hsl(150, 5%, 96%);
  padding: 1.125rem 1.25rem;
  border-radius: 0.625rem;
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 0.9375rem;
  font-weight: 500;
  cursor: pointer;
  text-align: left;
  transition: all 200ms ease;
  line-height: 1.4;
  width: 100%;
}
.quiz-option:hover {
  border-color: hsl(155, 45%, 32%);
  background-color: hsla(155, 45%, 32%, 0.08);
  transform: translateX(2px);
}
.quiz-back {
  background: transparent;
  border: none;
  color: hsl(150, 8%, 50%);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 0.875rem;
  font-weight: 500;
  cursor: pointer;
  padding: 0.5rem 0;
  margin-top: 1.25rem;
  transition: color 200ms ease;
}
.quiz-back:hover { color: hsl(155, 45%, 32%); }
.quiz-result-card {
  background-color: hsl(150, 8%, 9%);
  border: 1px solid hsl(150, 8%, 18%);
  border-radius: 1rem;
  padding: 2.5rem;
}
@media (max-width: 480px) {
  .quiz-result-card { padding: 1.75rem; }
}
</style>
